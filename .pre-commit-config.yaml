repos:
  # ── Python ─────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── YAML / TOML / JSON ────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: tsconfig\.json  # tsconfig allows comments
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^tests/test_secrets_redactor\.py$|^tests/test_saml\.py$
      - id: no-commit-to-branch
        args: [--branch, main]
        stages: [pre-commit]

  # ── Secrets / .env guard ───────────────────────────────
  - repo: local
    hooks:
      - id: check-secrets
        name: check for secrets and .env files
        entry: scripts/check_secrets.sh
        language: script
        pass_filenames: false

  # ── Alembic migrations ─────────────────────────────────
  - repo: local
    hooks:
      - id: check-migrations
        name: check alembic migration chain
        entry: python3 scripts/check_migrations.py
        language: system
        files: ^observal-server/alembic/versions/.*\.py$
        pass_filenames: false


  # ── SPDX copyright update ──────────────────────────────────────
  - repo: local
    hooks:
      - id: spdx-update
        name: add committer copyright to SPDX headers
        entry: python3 scripts/update_spdx_copyright.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

  # ── Docker ─────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3013]
